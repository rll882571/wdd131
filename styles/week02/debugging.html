<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Debugging</title>
    <!-- O 'defer' garante que o JS só corre depois do HTML carregar -->
    <script src="scripts/debugging.js" defer></script>
</head>
<body>
    <h1 id="titulo-principal">JavaScript Debugging using DevTools</h1>
    
    <!-- Estes spans vão receber os resultados do nosso cálculo via JS -->
    <p>Área do círculo com raio <span id="radius"></span>: <span id="area"></span></p>
     <p>O circulo é: <span id="circulo"></span></p>
</body>
</html>
