<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W05 Code-along Activity: Quiz Form</title>
    <meta name="author" content="Rodrigo Lima">
    <meta name="description" content="A valid HTML form acting as an online quiz about HTML and CSS, created for the WDD 130 course.">
    
    <link rel="stylesheet" href="quiz.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@100;400&family=Roboto:wght@100;400&display=swap" rel="stylesheet">
    
    </head>
<body>
   <header>


   </header>
   <main>
    <form action="">
        <label for="q1">1.What does the acronym CSS stand for?</label>
        <input type="text" id="q1" name="q1">
        <label for="q2">2. How are id and class attributes selected in CSS?</label>
        <textarea id="q2" name="q2" rows="4"></textarea>
        <label for="q3">3. Which of the following is a valid CSS comment?</label>
<select id="q3" name="q3">
          <option value="" selected disabled>Choose One ...</option>
          <option value="1">/* comment */</option>
         <option value="2">// comment</option>
    <option value="3">&lt;!-- comment --&gt;</option>
</select>
<div class="form-item">
    <label for="q4">4. What is the bottom margin given this declaration?</label>
    <p><code>margin: 10px 5px 15px;</code></p>
    <input type="number" id="q4" name="q4">
    <button type="submit">Submit Quiz</button>

</div>
    </form>

   </main>
   <footer></footer>
  </body>
  </html>
